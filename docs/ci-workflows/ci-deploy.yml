name: CI — Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-pages:
    name: Build Pages
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify web files
        run: |
          for f in web/index.html web/app.html; do
            [ -f "$f" ] && echo "✅ $f" || { echo "❌ $f"; exit 1; }
          done
      - name: Inject deployment metadata
        run: |
          python3 -c "
          import datetime, os
          meta = '<!-- DEPLOY: ${{ github.sha }} | ' + datetime.datetime.utcnow().isoformat() + 'Z -->'
          for h in ['web/index.html', 'web/app.html']:
              if os.path.exists(h):
                  c = open(h).read()
                  if '<!-- DEPLOY:' not in c:
                      open(h, 'w').write(c.replace('<head>', '<head>\\n' + meta, 1))
                  print(f'✅ {h}')
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-pages
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - run: |
          echo "🚀 DEPLOYED: ${{ steps.deployment.outputs.page_url }}"
          echo "Commit: ${{ github.sha }}"
