name: CI — Build Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-bundle:
    name: Build Workspace Bundle
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install numpy pyyaml
      - name: Build workspace
        run: python3 workspace_build.py
      - name: Verify bundle
        run: |
          [ -f "web/workspace_bundle.tar.gz" ] || { echo "❌ Missing"; exit 1; }
          SIZE=$(stat --format=%s "web/workspace_bundle.tar.gz" 2>/dev/null || stat -f%z "web/workspace_bundle.tar.gz")
          echo "✅ Bundle: ${SIZE} bytes, $(tar tzf web/workspace_bundle.tar.gz | wc -l) entries"
      - name: Post-build physics
        run: |
          python3 -c "
          import yaml, sys
          sys.path.insert(0, 'src')
          from physics_validator import verify_mass_balance
          with open('config/engineering_data.yaml') as f:
              c = yaml.safe_load(f)
          r = verify_mass_balance(c)
          assert r['system_verification_status'] in ('PASS', 'WARN_LIMIT')
          print(f'✅ Physics: {r[\"system_verification_status\"]}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: workspace-bundle-${{ github.sha }}
          path: web/workspace_bundle.tar.gz
          retention-days: 30

  verify-bundle:
    name: Verify Extraction
    runs-on: ubuntu-latest
    needs: build-bundle
    environment:
      name: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace-bundle-${{ github.sha }}
      - name: Extract
        run: |
          mkdir -p /tmp/ex
          if [ -f "web/workspace_bundle.tar.gz" ]; then
            ARCHIVE="web/workspace_bundle.tar.gz"
          elif [ -f "workspace_bundle.tar.gz" ]; then
            ARCHIVE="workspace_bundle.tar.gz"
          else
            echo "❌ Missing bundle archive"
            exit 1
          fi
          tar xzf "$ARCHIVE" -C /tmp/ex 2>/dev/null
          FILE_COUNT=$(find /tmp/ex -type f | wc -l)
          [ "$FILE_COUNT" -gt 0 ] || { echo "❌ Extraction produced no files"; exit 1; }
          echo "✅ Extracted ${FILE_COUNT} files"
