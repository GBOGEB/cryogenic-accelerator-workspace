name: CI — Build Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  PYTHON_VERSION: '3.11'
  BUNDLE_NAME: workspace-bundle

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build Workspace Bundle
  # ──────────────────────────────────────────────
  build-bundle:
    name: "📦 Build Workspace Bundle"
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    outputs:
      bundle_size: ${{ steps.verify.outputs.size }}
      bundle_entries: ${{ steps.verify.outputs.entries }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy pyyaml

      - name: Extract version metadata
        id: meta
        run: |
          VERSION=$(python3 -c "
          import yaml
          with open('config/engineering_data.yaml') as f:
              d = yaml.safe_load(f)
          print(d['version_control']['current_version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📋 Version: $VERSION"

      - name: Build workspace
        run: python3 workspace_build.py

      - name: Verify bundle
        id: verify
        run: |
          [ -f "web/workspace_bundle.tar.gz" ] || { echo "❌ Bundle missing"; exit 1; }
          SIZE=$(stat --format=%s "web/workspace_bundle.tar.gz" 2>/dev/null || stat -f%z "web/workspace_bundle.tar.gz")
          ENTRIES=$(tar tzf web/workspace_bundle.tar.gz | wc -l)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "entries=$ENTRIES" >> "$GITHUB_OUTPUT"
          echo "✅ Bundle: ${SIZE} bytes, ${ENTRIES} entries"

      - name: Post-build physics validation
        run: |
          python3 << 'EOF'
          import yaml, sys
          sys.path.insert(0, 'src')
          from physics_validator import verify_mass_balance
          with open('config/engineering_data.yaml') as f:
              c = yaml.safe_load(f)
          r = verify_mass_balance(c)
          assert r['system_verification_status'] in ('PASS', 'WARN_LIMIT')
          print(f'✅ Physics: {r["system_verification_status"]} (ṁ={r["calculated_mass_flow_kg_s"]} kg/s)')
          EOF

      - name: Generate build manifest
        run: |
          python3 << 'EOF'
          import json, datetime, os, hashlib
          bundle = 'web/workspace_bundle.tar.gz'
          sha = hashlib.sha256(open(bundle, 'rb').read()).hexdigest()
          manifest = {
              "build_time": datetime.datetime.utcnow().isoformat() + "Z",
              "version": "${{ steps.meta.outputs.version }}",
              "commit": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "bundle_sha256": sha,
              "bundle_size": os.path.getsize(bundle),
              "runner": "${{ runner.os }}"
          }
          with open('build-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f"✅ Manifest: sha256={sha[:16]}...")
          EOF

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_NAME }}-${{ github.sha }}
          path: |
            web/workspace_bundle.tar.gz
            build-manifest.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # JOB 2: Verify Bundle Extraction
  # ──────────────────────────────────────────────
  verify-bundle:
    name: "✅ Verify Extraction"
    runs-on: ubuntu-latest
    needs: build-bundle
    environment:
      name: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUNDLE_NAME }}-${{ github.sha }}

      - name: Extract and validate
        run: |
          mkdir -p /tmp/extracted
          if [ -f web/workspace_bundle.tar.gz ]; then
            tar xzf web/workspace_bundle.tar.gz -C /tmp/extracted
          elif [ -f workspace_bundle.tar.gz ]; then
            tar xzf workspace_bundle.tar.gz -C /tmp/extracted
          else
            echo "❌ Bundle archive not found in expected locations" >&2
            exit 1
          fi
          FILES=$(find /tmp/extracted -type f | wc -l)
          if [ "$FILES" -le 0 ]; then
            echo "❌ Extraction produced no files" >&2
            exit 1
          fi
          echo "✅ Extracted $FILES files"
          find /tmp/extracted -type f -exec echo "  📄 {}" \;

      - name: Validate manifest
        run: |
          python3 << 'EOF'
          import json
          with open('build-manifest.json') as f:
              m = json.load(f)
          for key in ['build_time', 'version', 'commit', 'bundle_sha256', 'bundle_size']:
              assert key in m, f"Missing: {key}"
          assert len(m['bundle_sha256']) == 64
          assert m['bundle_size'] > 0
          print(f"✅ Manifest valid — v{m['version']} @ {m['commit'][:8]}")
          EOF

      - name: Build summary
        run: |
          echo "══════════════════════════════════════"
          echo "  BUILD PIPELINE — SUMMARY"
          echo "══════════════════════════════════════"
          echo "  Version:  ${{ needs.build-bundle.outputs.version }}"
          echo "  Size:     ${{ needs.build-bundle.outputs.bundle_size }} bytes"
          echo "  Entries:  ${{ needs.build-bundle.outputs.bundle_entries }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "══════════════════════════════════════"
